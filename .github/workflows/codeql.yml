name: CodeQL

# Strategy: don't gate PRs on CodeQL (16min/run × every push = high cost
# for a small benefit on an active-dev repo). Run on every push to main
# to catch what actually lands, and nightly to surface CWE rule updates
# from GitHub's curated query pack without manual intervention. PRs get
# fast feedback from `ci.yml` (build + test + format).
on:
  push:
    branches: [main]
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET SDK (pinned by global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Build (Release)
        run: |
          dotnet restore SbeB3Exchange.slnx
          dotnet build SbeB3Exchange.slnx --no-restore -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
